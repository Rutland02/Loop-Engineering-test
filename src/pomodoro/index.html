<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>番茄钟</h1>
        
        <div class="timer-display">
            <div id="timer">25:00</div>
            <div id="timer-label">工作时间</div>
        </div>
        
        <div class="controls">
            <button id="start-btn" class="btn btn-primary">开始</button>
            <button id="pause-btn" class="btn btn-secondary" disabled>暂停</button>
            <button id="reset-btn" class="btn btn-secondary">重置</button>
        </div>
        
        <div class="session-info">
            <div class="tomato-count">
                <span>?? 番茄钟计数: </span>
                <span id="tomato-count">0</span>
            </div>
            <div class="session-type">
                <span>当前模式: </span>
                <span id="session-type">工作</span>
            </div>
        </div>
        
        <div class="settings">
            <h3>设置</h3>
            <div class="setting-item">
                <label for="work-duration">工作时长 (分钟):</label>
                <input type="number" id="work-duration" value="25" min="1" max="60">
            </div>
            <div class="setting-item">
                <label for="short-break">短休息时长 (分钟):</label>
                <input type="number" id="short-break" value="5" min="1" max="30">
            </div>
            <div class="setting-item">
                <label for="long-break">长休息时长 (分钟):</label>
                <input type="number" id="long-break" value="15" min="1" max="60">
            </div>
            <button id="save-settings" class="btn btn-secondary">保存设置</button>
        </div>
        
        <div class="audio-controls">
            <label>
                <input type="checkbox" id="sound-toggle" checked>
                启用音效
            </label>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
